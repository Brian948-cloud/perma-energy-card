<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="心理能量卡">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/180/e5d8b5/5a5a5a?text=能量卡">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>心理能量卡</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      --bg-main: #f2eee2; 
      --color-p: #ffb7b2; --color-e: #ffdac1; --color-r: #b2e2f2; --color-m: #e2f0cb; --color-a: #d9c2f2;
      --btn-blue: #7d96ff;
    }

    body {
      font-family: 'Noto Serif TC', serif;
      background-color: #f8f8f8;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      -webkit-tap-highlight-color: transparent;
    }

    #capture-area {
      background-color: var(--bg-main);
      width: 330px; 
      height: 412.5px; /* 完美 IG 4:5 比例 */
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      border-radius: 12px;
      padding: 0 20px;
      position: relative;
      margin-bottom: 25px;
    }

    .header-container {
      margin-top: 30px;
      background: white;
      width: 160px; height: 46px;
      border-radius: 23px;
      display: flex; justify-content: center; align-items: center;
    }

    .title-tag {
      background: #e5d8b5;
      width: 138px; height: 32px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 0.95rem;
      color: #5a5a5a;
      display: flex; justify-content: center; align-items: center;
      letter-spacing: 1.5px;
    }

    .content-area {
      flex: 1;
      display: flex; 
      justify-content: center; 
      align-items: center;
      text-align: center;
      width: 100%;
    }

    /* 修正重點：主文字兩行顯示與行距控制 */
    .quote-display {
      font-size: 1.6rem;
      line-height: 2.2; /* 增加行高，模擬圖片中的優雅感 */
      font-weight: 500;
      color: #444;
      letter-spacing: 1px;
      white-space: pre-line; /* 強制執行 \n 換行指令 */
      display: block;
      width: 100%;
    }

    .footer-area {
      padding-bottom: 35px;
      text-align: center;
      width: 100%;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .category-tag {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.03);
      white-space: nowrap !important; /* 分類標籤維持單行 */
    }

    .date-display { color: #aaa; font-size: 0.8rem; letter-spacing: 1px; }

    .controls { display: flex; gap: 15px; }

    button {
      font-family: 'Noto Serif TC', serif;
      border: none;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      transition: all 0.2s ease;
    }

    .save-btn { background-color: var(--btn-blue); color: white; }
    .reset-btn { background-color: white; color: #666; }
    .draw-btn { background-color: #e5d8b5; color: #5a5a5a; }

    button:active { transform: scale(0.96); opacity: 0.9; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="capture-area">
  <div class="header-container">
    <div class="title-tag">心理能量卡</div>
  </div>

  <div class="content-area">
    <div class="quote-display" id="quote">
      點擊下方按鈕<br>抽一張心理能量卡
    </div>
  </div>

  <div class="footer-area">
    <div id="result-info" class="hidden">
      <div class="category-tag" id="category">PERMA</div>
      <div class="date-display" id="today-date"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button id="start-btn" class="draw-btn" onclick="drawCard()">抽一張卡</button>
  <button id="save-btn" class="save-btn hidden" onclick="saveAsImage()">儲存圖卡</button>
  <button id="reset-btn" class="reset-btn hidden" onclick="resetPage()">再抽一次</button>
</div>

<script>
  const permaColors = { "P": "var(--color-p)", "E": "var(--color-e)", "R": "var(--color-r)", "M": "var(--color-m)", "A": "var(--color-a)" };

  // 手動校對 20 則金句的換行位置，確保視覺美觀
  const quotes = [
    { text: "今天的每一份好心情，\n都是珍貴的禮物。", cat: "PERMA • Positive Emotions 正向情緒", type: "P" },
    { text: "允許自己休息，\n也是前進的一部分。", cat: "PERMA • Positive Emotions 正向情緒", type: "P" },
    { text: "發現生活中的微小美好，\n就是幸福的開始。", cat: "PERMA • Positive Emotions 正向情緒", type: "P" },
    { text: "感受當下的呼吸，\n讓心平靜下來。", cat: "PERMA • Positive Emotions 正向情緒", type: "P" },
    { text: "全心投入當下，\n你會發現時間的魔力。", cat: "PERMA • Engagement 投入", type: "E" },
    { text: "專注於你喜愛的事，\n內心會充滿力量。", cat: "PERMA • Engagement 投入", type: "E" },
    { text: "在挑戰中找到樂趣，\n就是一種成長。", cat: "PERMA • Engagement 投入", type: "E" },
    { text: "沉浸在創作的時刻，\n靈魂會發光。", cat: "PERMA • Engagement 投入", type: "E" },
    { text: "一個溫暖的問候，\n能建立深厚的連結。", cat: "PERMA • Relationships 人際關係", type: "R" },
    { text: "學會傾聽他人，\n也學會傾聽自己。", cat: "PERMA • Relationships 人際關係", type: "R" },
    { text: "真誠的讚美，\n是人與人之間最美的橋樑。", cat: "PERMA • Relationships 人際關係", type: "R" },
    { text: "即使意見不同，\n我們依然可以互相尊重。", cat: "PERMA • Relationships 人際關係", type: "R" },
    { text: "明白行為背後的意義，\n讓每一步更有力。", cat: "PERMA • Meaning 意義", type: "M" },
    { text: "你的存在，\n本身就是一個獨特的意義。", cat: "PERMA • Meaning 意義", type: "M" },
    { text: "幫助他人，\n也能讓自己的內心更豐盛。", cat: "PERMA • Meaning 意義", type: "M" },
    { text: "在瑣碎的日常中，\n尋找值得堅持的價值。", cat: "PERMA • Meaning 意義", type: "M" },
    { text: "今天的一小步，\n也是邁向成長的重要一步。", cat: "PERMA • Accomplishment 成就", type: "A" },
    { text: "感謝自己今天的努力，\n你已經做得很好了。", cat: "PERMA • Accomplishment 成就", type: "A" },
    { text: "完成一件小事，\n就是給自己最好的肯定。", cat: "PERMA • Accomplishment 成就", type: "A" },
    { text: "失敗只是暫時的停留，\n你可以再次出發。", cat: "PERMA • Accomplishment 成就", type: "A" }
  ];

  function drawCard() {
    const selected = quotes[Math.floor(Math.random() * quotes.length)];
    document.getElementById("quote").innerText = selected.text;
    const catEl = document.getElementById("category");
    catEl.innerText = selected.cat;
    catEl.style.backgroundColor = permaColors[selected.type];
    
    const now = new Date();
    document.getElementById("today-date").innerText = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}`;

    document.getElementById("start-btn").classList.add("hidden");
    document.getElementById("save-btn").classList.remove("hidden");
    document.getElementById("reset-btn").classList.remove("hidden");
    document.getElementById("result-info").classList.remove("hidden");
  }

  function resetPage() {
    document.getElementById("quote").innerHTML = "點擊下方按鈕<br>抽一張心理能量卡";
    document.getElementById("start-btn").classList.remove("hidden");
    document.getElementById("save-btn").classList.add("hidden");
    document.getElementById("reset-btn").classList.add("hidden");
    document.getElementById("result-info").classList.add("hidden");
  }

  async function saveAsImage() {
    const area = document.getElementById("capture-area");
    const canvas = await html2canvas(area, { 
      scale: 3, 
      useCORS: true,
      backgroundColor: "#f8f8f8" 
    });
    const link = document.createElement("a");
    link.download = `能量卡-${new Date().getTime()}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  }
</script>

</body>
</html>
