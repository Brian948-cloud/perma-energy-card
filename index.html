<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日心理能量卡</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="心理能量卡">
<meta name="mobile-web-app-capable" content="yes">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* Reset & body */
body, html {
  margin:0;
  padding:0;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:"Noto Sans TC",sans-serif;
  background: #FDF5E6;
}

/* 卡片容器，直式 4:5 */
#cardContainer {
  width:320px;
  height:400px;
  perspective:1200px;
  cursor:pointer;
}

/* 卡片翻轉 */
.card-inner {
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 0.8s;
  border-radius:28px;
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

/* 卡片兩面 */
.card-face {
  position:absolute;
  width:100%;
  height:100%;
  border-radius:28px;
  backface-visibility:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  box-sizing:border-box;
  box-shadow: 0 25px 50px rgba(0,0,0,0.15),
              0 10px 20px rgba(0,0,0,0.08);
  text-align:center;
  padding:20px;
}

/* 正面 */
.card-front {
  background: linear-gradient(135deg,#fffdf7,#f6e8cc);
  font-size:22px;
  color:#6e5d4a;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 背面 */
.card-back {
  background: linear-gradient(135deg,#fffefb,#f6e6c6);
  transform: rotateY(180deg);
  display:flex;
  flex-direction:column;
  justify-content: space-between;
  align-items:center;
  padding:30px 20px;
}

/* 標題 */
.card-title {
  font-size:20px;
  color:#7a6a55;
  letter-spacing:2px;
}

/* 語句 */
.quote {
  font-size:24px;
  line-height:1.6;
  color:#4e4439;
  text-align:center;
  margin:20px 0;
}

/* PERMA徽章 */
.badge {
  padding:8px 20px;
  border-radius:30px;
  color:#4e4439;
  font-size:14px;
  font-weight:500;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

/* PERMA 顏色 */
.badge-P {background:#FFD966;} /* Positive Emotion 黃 */
.badge-E {background:#6FA8DC;} /* Engagement 藍 */
.badge-R {background:#EA9999;} /* Relationships 紅 */
.badge-M {background:#B4A7D6;} /* Meaning 紫 */
.badge-A {background:#93C47D;} /* Accomplishment 綠 */

/* 日期 */
.date {
  font-size:13px;
  color:#7a6a55;
}

/* 按鈕 */
.buttons {
  margin-top:20px;
  display:none;
  text-align:center;
}
button {
  margin:5px;
  border:none;
  padding:10px 20px;
  border-radius:25px;
  background:#EAD8B7;
  cursor:pointer;
  font-size:14px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}
button:hover {
  background:#e0c89f;
}
</style>
</head>

<body>

<div id="cardContainer">
  <div class="card" id="card">
    <div class="card-inner">
      <div class="card-face card-front">
        點擊抽取<br>今日心理能量
      </div>
      <div class="card-face card-back">
        <div class="card-title">今日心理能量卡</div>
        <div class="quote" id="quote">點擊下方抽取今日心理能量</div>
        <div class="badge" id="badge"></div>
        <div class="date" id="date"></div>
      </div>
    </div>
  </div>
</div>

<div class="buttons" id="buttons">
  <button onclick="downloadCard()">下載圖卡</button>
  <button onclick="resetCard()">再抽一次</button>
</div>

<script>
const cards=[
  {quote:"今天的一小步，也是邁向成長的重要一步。",tag:"Accomplishment 成就",type:"A"},
  {quote:"情緒被看見時，力量就開始恢復。",tag:"Relationships 人際連結",type:"R"},
  {quote:"專注當下的投入，就是通往心流的入口。",tag:"Engagement 心流投入",type:"E"},
  {quote:"即使在困難中，人仍能找到生命的意義。",tag:"Meaning 生命意義",type:"M"},
  {quote:"關係中的溫暖，是幸福感的重要來源。",tag:"Relationships 人際連結",type:"R"},
  {quote:"每一次努力，都是對自己能力的肯定。",tag:"Accomplishment 成就",type:"A"},
  {quote:"允許自己慢慢來，也是一種成熟的力量。",tag:"Positive Emotion 正向情緒",type:"P"},
  {quote:"在微小的好事裡，看見今天的光。",tag:"Positive Emotion 正向情緒",type:"P"},
  {quote:"投入當下，生命會回應你的專注。",tag:"Engagement 心流投入",type:"E"},
  {quote:"韌性不是沒有跌倒，而是仍願意再站起來。",tag:"Meaning 生命意義",type:"M"}
];

const card=document.getElementById("card")
const quote=document.getElementById("quote")
const badge=document.getElementById("badge")
const dateElem=document.getElementById("date")
const buttons=document.getElementById("buttons")

let flipped=false

card.addEventListener("click",()=>{
  if(flipped) return
  const random=cards[Math.floor(Math.random()*cards.length)]
  quote.innerText=random.quote
  badge.innerText="PERMA · "+random.tag
  badge.className="badge badge-"+random.type

  const today=new Date()
  dateElem.innerText=today.getFullYear()+"."+String(today.getMonth()+1).padStart(2,'0')+"."+String(today.getDate()).padStart(2,'0')

  card.classList.add("flipped")
  buttons.style.display="block"
  flipped=true
})

function resetCard(){
  card.classList.remove("flipped")
  buttons.style.display="none"
  flipped=false
  quote.innerText="點擊下方抽取今日心理能量"
  badge.innerText=""
  badge.className="badge"
  dateElem.innerText=""
}

function downloadCard(){
  const cardContainer=document.getElementById("cardContainer")
  html2canvas(cardContainer,{
    scale:3.375,
    useCORS:true,
    width:cardContainer.offsetWidth,
    height:cardContainer.offsetHeight
  }).then(canvas=>{
    const link=document.createElement("a")
    link.download="今日心理能量卡.png"
    link.href=canvas.toDataURL()
    link.click()
  })
}
</script>

</body>

</html>
