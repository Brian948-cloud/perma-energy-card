<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>今日心理能量卡</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="心理能量卡">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3062/3062634.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* 基礎設定 */
body, html {
  margin:0; padding:0; height:100%; display:flex;
  justify-content:center; align-items:center;
  font-family:"Noto Sans TC", sans-serif; background: #FDF5E6;
  overflow: hidden;
}

/* 卡片外框 */
#cardContainer {
  width: 90vw; /* 寬度隨螢幕調整 */
  max-width: 340px;
  height: 420px;
  perspective: 1200px;
  -webkit-tap-highlight-color: transparent;
}

.card-inner {
  width:100%; height:100%; position:relative;
  transform-style:preserve-3d; transition: transform 0.6s;
  border-radius:28px;
}
.card.flipped .card-inner { transform: rotateY(180deg); }

.card-face {
  position:absolute; width:100%; height:100%; border-radius:28px;
  backface-visibility:hidden; display:flex; flex-direction:column;
  align-items:center; padding:30px 20px;
  box-sizing:border-box; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
}

/* 正面 */
.card-front { 
  background: linear-gradient(135deg,#fffdf7,#f6e8cc); 
  color:#6e5d4a; font-size:24px; font-weight: bold;
  justify-content:center;
}

/* 背面 */
.card-back { 
  background: white; 
  transform: rotateY(180deg); 
  justify-content: space-between; 
}

/* 修正標題重疊與白框問題 */
.card-title {
  font-size: 18px;
  color: #7a6a55;
  background: #fdf5e6; /* 加入底色形成白框感 */
  padding: 8px 20px;
  border-radius: 50px; /* 膠囊形狀 */
  font-weight: bold;
  display: block;
  text-align: center;
  width: fit-content;
  margin-top: 10px;
}

/* 語句文字 */
.quote { 
  font-size: 22px; 
  line-height: 1.6; 
  color: #4e4439; 
  margin: auto; /* 自動置中 */
  text-align: center;
}

.badge { padding:8px 15px; border-radius:20px; font-size:14px; margin-bottom: 5px;}
.badge-P {background:#FFD966;} .badge-E {background:#6FA8DC;}
.badge-R {background:#EA9999;} .badge-M {background:#B4A7D6;} .badge-A {background:#93C47D;}
.date { font-size:13px; color:#999; margin-bottom: 10px;}

/* 按鈕區 */
.buttons { 
  position: fixed; bottom: 30px; 
  display:none; width: 100%; text-align: center;
}
button { 
  padding:12px 24px; border-radius:25px; border:none; 
  background:#EAD8B7; margin:5px; font-size: 16px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<div id="cardContainer">
  <div class="card" id="card">
    <div class="card-inner">
      <div class="card-face card-front">點擊抽取<br>今日心理能量</div>
      <div class="card-face card-back">
        <div class="card-title">今日心理能量卡</div>
        <div class="quote" id="quote"></div>
        <div class="badge" id="badge"></div>
        <div class="date" id="date"></div>
      </div>
    </div>
  </div>
</div>

<div class="buttons" id="buttons">
  <button onclick="downloadCard()">儲存圖卡</button>
  <button onclick="location.reload()">再抽一次</button>
</div>

<script>
const cards=[
  {quote:"今天的一小步，也是邁向成長的重要一步。",tag:"Accomplishment 成就",type:"A"},
  {quote:"情緒被看見時，力量就開始恢復。",tag:"Relationships 人際連結",type:"R"},
  {quote:"專注當下的投入，就是通往心流的入口。",tag:"Engagement 心流投入",type:"E"},
  {quote:"即使在困難中，人仍能找到生命的意義。",tag:"Meaning 生命意義",type:"M"},
  {quote:"關係中的溫暖，是幸福感的重要來源。",tag:"Relationships 人際連結",type:"R"},
  {quote:"每一次努力，都是對自己能力的肯定。",tag:"Accomplishment 成就",type:"A"},
  {quote:"允許自己慢慢來，也是一種成熟的力量。",tag:"Positive Emotion 正向情緒",type:"P"},
  {quote:"在微小的好事裡，看見今天的光。",tag:"Positive Emotion 正向情緒",type:"P"},
  {quote:"投入當下，生命會回應你的專注。",tag:"Engagement 心流投入",type:"E"},
  {quote:"韌性不是沒有跌倒，而是仍願意再站起來。",tag:"Meaning 生命意義",type:"M"}
];

const card=document.getElementById("card");
card.addEventListener("click", function() {
  if(card.classList.contains("flipped")) return;
  const res = cards[Math.floor(Math.random()*cards.length)];
  document.getElementById("quote").innerText = res.quote;
  const b = document.getElementById("badge");
  b.innerText = res.tag; b.className = "badge badge-" + res.type;
  document.getElementById("date").innerText = new Date().toLocaleDateString();
  card.classList.add("flipped");
  document.getElementById("buttons").style.display = "block";
});

function downloadCard(){
  html2canvas(document.getElementById("cardContainer"), {backgroundColor:null}).then(canvas => {
    const link = document.createElement("a");
    link.download = "心理能量卡.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  });
}
</script>
</body>
</html>
