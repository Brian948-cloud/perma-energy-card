<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理能量卡</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg-color: #f2eee2; 
    --btn-default: #ebdcb2;
    --text-main: #3a3a3a;
    --color-p: #ffb7b2; --color-e: #ffdac1; --color-r: #b2e2f2; --color-m: #e2f0cb; --color-a: #d9c2f2;
  }

  body {
    font-family: 'Noto Serif TC', serif;
    background-color: #e8e8e8;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }

  #capture-area {
    background-color: var(--bg-color);
    width: 360px; 
    height: 450px; 
    display: flex;
    flex-direction: column;
    align-items: center;
    box-sizing: border-box;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    border-radius: 10px;
    padding: 0 30px;
    position: relative;
  }

  .header-container {
    margin-top: 35px;
    background: white;
    width: 180px; height: 50px;
    border-radius: 25px;
    display: flex; justify-content: center; align-items: center;
  }

  .title-tag {
    background: var(--btn-default);
    width: 154px; height: 36px;
    border-radius: 18px;
    font-weight: 700;
    font-size: 1rem;
    color: #555;
    display: flex; justify-content: center; align-items: center;
    letter-spacing: 2px;
  }

  .content-area {
    flex: 1;
    display: flex; justify-content: center; align-items: center;
    text-align: center;
    width: 100%;
  }

  .quote-display {
    font-size: 1.5rem;
    line-height: 1.8;
    font-weight: 500;
    color: var(--text-main);
  }

  .footer-area {
    padding-bottom: 40px;
    text-align: center;
    min-height: 80px;
  }

  .category-tag {
    display: inline-block;
    padding: 6px 22px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 8px;
    color: #444;
  }

  .date-display {
    color: #999;
    font-size: 0.8rem;
  }

  .controls { margin-top: 25px; display: flex; gap: 15px; }

  button {
    font-family: 'Noto Serif TC', serif;
    background-color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 25px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 700;
    color: #666;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  .save-btn { background-color: #6c8cff; color: white; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="capture-area">
  <div class="header-container">
    <div class="title-tag">心理能量卡</div>
  </div>

  <div class="content-area">
    <div class="quote-display" id="quote">
      點擊下方按鈕<br>抽一張心理能量卡
    </div>
  </div>

  <div class="footer-area">
    <div id="result-info" class="hidden">
      <div class="category-tag" id="category">PERMA</div>
      <div class="date-display" id="today-date"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button id="start-btn" onclick="drawCard()">抽一張卡</button>
  <button id="save-btn" class="save-btn hidden" onclick="saveAsImage()">儲存圖卡</button>
  <button id="reset-btn" class="hidden" onclick="resetPage()">再抽一次</button>
</div>

<script>
const permaColors = { "P": "var(--color-p)", "E": "var(--color-e)", "R": "var(--color-r)", "M": "var(--color-m)", "A": "var(--color-a)" };

// 已擴充至 20 張卡片
const quotes = [
  { text: "今天的每一份好心情，都是珍貴的禮物。", cat: "PERMA • Positive Emotions 正向情緒", type: "P" },
  { text: "允許自己休息，也是前進的一部分。", cat: "PERMA • Positive Emotions 正向情緒", type: "P" },
  { text: "發現生活中的微小美好，就是幸福的開始。", cat: "PERMA • Positive Emotions 正向情緒", type: "P" },
  { text: "感受當下的呼吸，讓心平靜下來。", cat: "PERMA • Positive Emotions 正向情緒", type: "P" },
  { text: "全心投入當下，你會發現時間的魔力。", cat: "PERMA • Engagement 投入", type: "E" },
  { text: "專注於你喜愛的事，內心會充滿力量。", cat: "PERMA • Engagement 投入", type: "E" },
  { text: "在挑戰中找到樂趣，就是一種成長。", cat: "PERMA • Engagement 投入", type: "E" },
  { text: "沉浸在創作的時刻，靈魂會發光。", cat: "PERMA • Engagement 投入", type: "E" },
  { text: "一個溫暖的問候，能建立深厚的連結。", cat: "PERMA • Relationships 人際關係", type: "R" },
  { text: "學會傾聽他人，也學會傾聽自己。", cat: "PERMA • Relationships 人際關係", type: "R" },
  { text: "真誠的讚美，是人與人之間最美的橋樑。", cat: "PERMA • Relationships 人際關係", type: "R" },
  { text: "即使意見不同，我們依然可以互相尊重。", cat: "PERMA • Relationships 人際關係", type: "R" },
  { text: "明白行為背後的意義，讓每一步更有力。", cat: "PERMA • Meaning 意義", type: "M" },
  { text: "你的存在，本身就是一個獨特的意義。", cat: "PERMA • Meaning 意義", type: "M" },
  { text: "幫助他人，也能讓自己的內心更豐盛。", cat: "PERMA • Meaning 意義", type: "M" },
  { text: "在瑣碎的日常中，尋找值得堅持的價值。", cat: "PERMA • Meaning 意義", type: "M" },
  { text: "今天的一小步，也是邁向成長的重要一步。", cat: "PERMA • Accomplishment 成就", type: "A" },
  { text: "感謝自己今天的努力，你已經做得很好了。", cat: "PERMA • Accomplishment 成就", type: "A" },
  { text: "完成一件小事，就是給自己最好的肯定。", cat: "PERMA • Accomplishment 成就", type: "A" },
  { text: "失敗只是暫時的停留，你可以再次出發。", cat: "PERMA • Accomplishment 成就", type: "A" }
];

function drawCard() {
  const selected = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById("quote").innerText = selected.text;
  const catEl = document.getElementById("category");
  catEl.innerText = selected.cat;
  catEl.style.backgroundColor = permaColors[selected.type];
  document.getElementById("today-date").innerText = new Date().toLocaleDateString();

  document.getElementById("start-btn").classList.add("hidden");
  document.getElementById("save-btn").classList.remove("hidden");
  document.getElementById("reset-btn").classList.remove("hidden");
  document.getElementById("result-info").classList.remove("hidden");
}

function resetPage() {
  document.getElementById("quote").innerHTML = "點擊下方按鈕<br>抽一張心理能量卡";
  document.getElementById("start-btn").classList.remove("hidden");
  document.getElementById("save-btn").classList.add("hidden");
  document.getElementById("reset-btn").classList.add("hidden");
  document.getElementById("result-info").classList.add("hidden");
}

async function saveAsImage() {
  const area = document.getElementById("capture-area");
  const canvas = await html2canvas(area, { scale: 3 });
  const link = document.createElement("a");
  link.download = `心理能量卡-${new Date().getTime()}.png`;
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
